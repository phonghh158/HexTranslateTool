<!doctype html>
<html lang="vi" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Doraemon Studio | Việt Hóa</title>
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header class="header">
            <div class="header-title">
                <h2>Doraemon Story of Seasons</h2>
                <span class="subtitle">Trình Biên Dịch Binary</span>
            </div>

            <div class="header-controls">
                <button id="themeToggle" class="btn btn-icon" title="Chuyển đổi giao diện">
                    🌙
                </button>

                <label class="btn btn-secondary" for="fileInput">📁 Mở File Gốc</label>
                <input type="file" id="fileInput" accept=".dat,.bytes" />

                <select
                    id="sourceLang"
                    class="search-box"
                    style="width: 120px"
                    title="Ngôn ngữ bản gốc"
                >
                    <option value="en" data-name="tiếng ANH" selected>Tiếng Anh</option>
                    <option value="ja" data-name="tiếng NHẬT">Tiếng Nhật</option>
                    <option value="zh-cn" data-name="tiếng TRUNG QUỐC">Tiếng Trung</option>
                    <option value="de" data-name="tiếng ĐỨC">Tiếng Đức</option>
                    <option value="th" data-name="tiếng THÁI LAN">Tiếng Thái</option>
                </select>

                <span style="color: var(--text-muted); font-weight: bold">➡️</span>

                <select
                    id="targetLang"
                    class="search-box"
                    style="width: 120px"
                    title="Ngôn ngữ muốn dịch sang"
                >
                    <option value="vi" data-name="tiếng VIỆT" selected>Tiếng Việt</option>
                    <option value="en" data-name="tiếng ANH">Tiếng Anh</option>
                </select>
                <input
                    type="text"
                    id="searchBox"
                    class="search-box"
                    placeholder="Tìm kiếm văn bản..."
                />

                <input
                    type="text"
                    id="exportPath"
                    class="search-box"
                    style="width: 180px"
                    placeholder="Dán thư mục lưu file..."
                />

                <button class="btn btn-primary" id="btnSave" disabled>💾 Đóng gói & Lưu</button>
            </div>
        </header>

        <main class="main-content">
            <table>
                <thead>
                    <tr>
                        <th style="width: 5%">Offset</th>
                        <th style="width: 39%">Bản gốc</th>
                        <th style="width: 2%; text-align: center">Dịch</th>
                        <th style="width: 39%">Bản dịch</th>
                        <th style="width: 15%">Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr>
                        <td colspan="5" class="empty-state">
                            Vui lòng mở file .dat hoặc .bytes để bắt đầu.
                        </td>
                    </tr>
                </tbody>
            </table>
        </main>

        <script src="app.js"></script>
    </body>
</html>
